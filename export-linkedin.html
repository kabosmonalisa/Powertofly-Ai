<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1584px; height: 396px; overflow: hidden; background: #E4FAEF; }

  .banner {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: linear-gradient(150deg, #E6F6FF 0%, #E4FAEF 46%, #F4FFDD 100%);
    font-family: Inter, Arial, sans-serif;
  }
  .blob-g {
    position: absolute; right: -120px; bottom: -120px;
    width: 55%; height: 150%; border-radius: 50%;
    background: radial-gradient(circle, rgba(79,232,169,.18), transparent 65%);
  }
  .blob-l {
    position: absolute; right: 25%; top: -80px;
    width: 35%; height: 120%; border-radius: 50%;
    background: radial-gradient(circle, rgba(213,255,102,.12), transparent 65%);
  }

  .photo-slot {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 840px; overflow: hidden;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 38%);
    mask-image: linear-gradient(to right, transparent 0%, black 38%);
  }
  .photo-slot img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: 35% top; display: block;
  }

  .eval-card {
    position: absolute;
    left: 860px; top: 56px;
    width: 256px;
    background: #0A0A0A;
    border: 1px solid rgba(79,232,169,.2);
    border-radius: 20px;
    box-shadow: 0 16px 64px rgba(0,0,0,.5);
    color: white; overflow: hidden;
  }
  .ec-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .ec-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; }
  .ec-role { font-size: 12px; color: rgba(255,255,255,.35); }
  .ec-badge {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    color: #4FE8A9; border: 1px solid rgba(79,232,169,.3);
    background: rgba(79,232,169,.08); border-radius: 4px;
    padding: 2px 8px; flex-shrink: 0;
  }
  .ec-rows { padding: 10px 18px 14px; display: flex; flex-direction: column; gap: 6px; }
  .ec-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 0; }
  .ec-label { font-size: 13px; color: rgba(255,255,255,.6); }
  .dots { display: flex; gap: 4px; }
  .d { width: 10px; height: 10px; border-radius: 50%; }
  .d.on  { background: #4FE8A9; }
  .d.off { background: rgba(255,255,255,.14); }

  .lockup {
    position: absolute;
    left: 0; top: 72px;
    width: 740px; padding-left: 72px;
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .ai-pill {
    background: linear-gradient(135deg, #5BCFFF 0%, #4FE8A9 55%, #D5FF66 100%);
    border-radius: 999px;
    font-family: 'Inter Tight', Inter, Arial, sans-serif;
    font-weight: 800; font-size: 17px;
    color: #0A0A0A;
    padding: 4px 16px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    letter-spacing: .02em;
  }
  .tagline {
    font-family: 'Inter Tight', Inter, Arial, sans-serif;
    font-weight: 600; font-size: 23px;
    color: #0A0A0A; line-height: 1.3; margin-bottom: 10px;
  }
  .url-text {
    font-size: 15px; color: rgba(10,10,10,.38);
    letter-spacing: .09em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="blob-g"></div>
  <div class="blob-l"></div>

  <div class="photo-slot">
    <img src="https://images.unsplash.com/photo-1664575603992-0f17b771dd91?w=1600&h=800&fit=crop&crop=top&q=90" alt="">
    <div class="photo-fade"></div>
  </div>

  <div class="eval-card">
    <div class="ec-head">
      <div>
        <div class="ec-name">Josephine M.</div>
        <div class="ec-role">Legal writer</div>
      </div>
      <div class="ec-badge">EVAL</div>
    </div>
    <div class="ec-rows">
      <div class="ec-row"><span class="ec-label">Accuracy</span><div class="dots"><div class="d on"></div><div class="d on"></div><div class="d on"></div><div class="d on"></div><div class="d on"></div></div></div>
      <div class="ec-row"><span class="ec-label">Tone</span><div class="dots"><div class="d on"></div><div class="d on"></div><div class="d on"></div><div class="d off"></div><div class="d off"></div></div></div>
      <div class="ec-row"><span class="ec-label">Completeness</span><div class="dots"><div class="d on"></div><div class="d on"></div><div class="d on"></div><div class="d on"></div><div class="d off"></div></div></div>
      <div class="ec-row"><span class="ec-label">Clarity</span><div class="dots"><div class="d on"></div><div class="d on"></div><div class="d on"></div><div class="d on"></div><div class="d off"></div></div></div>
    </div>
  </div>
