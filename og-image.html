<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG Image — PowerToFly AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Inter+Tight:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
body {
  font-family: 'Inter Tight', sans-serif;
  background: #0A0A0A;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 52px 68px 48px;
}

/* Gradient blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(100px);
  opacity: 0.35;
}
.blob-1 {
  width: 600px; height: 500px;
  background: #5BCFFF;
  top: -200px; left: -100px;
}
.blob-2 {
  width: 500px; height: 400px;
  background: #4FE8A9;
  bottom: -150px; right: -80px;
}
.blob-3 {
  width: 360px; height: 360px;
  background: #D5FF66;
  top: 20%; left: 50%;
  opacity: 0.18;
}

/* Top */
.top {
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative; z-index: 2;
}
.brand-wordmark {
  font-family: 'Inter Tight', sans-serif;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: #ffffff;
}
.brand-ai {
  padding: 5px 13px;
  border-radius: 999px;
  background: linear-gradient(135deg, #5BCFFF 0%, #4FE8A9 50%, #D5FF66 100%);
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: #0A2A1F;
}

/* Headline */
.headline {
  position: relative; z-index: 2;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: 88px;
  line-height: 0.95;
  letter-spacing: -0.045em;
  color: #ffffff;
  flex: 1;
  display: flex;
  align-items: center;
}
.headline .line1 { white-space: nowrap; }
.headline em {
  font-style: italic;
  background: linear-gradient(135deg, #5BCFFF 0%, #4FE8A9 50%, #D5FF66 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Bottom */
.bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative; z-index: 2;
}
.live {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #00C47A;
  box-shadow: 0 0 8px #00C47A;
}
.url {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.01em;
}

/* Bottom accent bar */
.accent-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, #5BCFFF, #4FE8A9, #D5FF66);
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="top">
  <span class="brand-wordmark">PowerToFly</span>
  <span class="brand-ai">AI</span>
</div>

<div class="headline">
  <div><span class="line1">Your AI is only as good as</span><br>the <em>humans</em> behind it.</div>
</div>

<div class="bottom">
  <div class="live">
    <span class="live-dot"></span>
    50,000 verified experts · ready to deploy
  </div>
  <span class="url">powertofly.com/ai</span>
</div>

<div class="accent-bar"></div>

</body>
</html>
